<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mock-up of the chosen board open in the hex map editor: a toolbar and tool palette, a hex board coloured by country with a selected capital and a sea route to an island, and an inspector panel showing the selected territory and board summary.">
      <!-- app frame -->
      <rect x="0" y="0" width="960" height="540" rx="10" fill="#eef2f6"/>
      <!-- top bar -->
      <rect x="0" y="0" width="960" height="40" fill="#f4f7fa" stroke="#dde3ea"/>
      <circle cx="18" cy="20" r="4.5" fill="#e6550d"/><circle cx="34" cy="20" r="4.5" fill="#e7ba52"/><circle cx="50" cy="20" r="4.5" fill="#31a354"/>
      <text x="72" y="25" font-family="system-ui" font-size="13" font-weight="700" fill="#234">Hex Map Editor</text>
      <text x="208" y="25" font-family="system-ui" font-size="12" fill="#8aa">— perm-04.json</text>
      <g font-family="system-ui" font-size="11.5">
        <rect x="430" y="9" width="62" height="22" rx="6" fill="#3182bd"/><text x="461" y="24" text-anchor="middle" fill="#fff" font-weight="700">Select</text>
        <rect x="498" y="9" width="54" height="22" rx="6" fill="#fff" stroke="#cdd9e3"/><text x="525" y="24" text-anchor="middle" fill="#456">Tiles</text>
        <rect x="558" y="9" width="74" height="22" rx="6" fill="#fff" stroke="#cdd9e3"/><text x="595" y="24" text-anchor="middle" fill="#456">Decorate</text>
        <rect x="638" y="9" width="68" height="22" rx="6" fill="#fff" stroke="#cdd9e3"/><text x="672" y="24" text-anchor="middle" fill="#456">Validate</text>
        <!-- view toggle -->
        <rect x="858" y="9" width="86" height="22" rx="6" fill="#eef4fb" stroke="#cdd9e3"/>
        <rect x="858" y="9" width="43" height="22" rx="6" fill="#3182bd"/>
        <text x="879" y="24" text-anchor="middle" fill="#fff" font-weight="700">2D</text><text x="922" y="24" text-anchor="middle" fill="#789">3D</text>
      </g>

      <!-- left tool palette -->
      <rect x="0" y="40" width="46" height="500" fill="#f7f9fc" stroke="#dde3ea"/>
      <g font-family="system-ui" font-size="12" font-weight="700" text-anchor="middle">
        <rect x="10" y="58" width="26" height="26" rx="6" fill="#3182bd"/><text x="23" y="76" fill="#fff">▣</text>
        <rect x="10" y="92" width="26" height="26" rx="6" fill="#fff" stroke="#cdd9e3"/><text x="23" y="110" fill="#789">⬡</text>
        <rect x="10" y="126" width="26" height="26" rx="6" fill="#fff" stroke="#cdd9e3"/><text x="23" y="144" fill="#789">♣</text>
        <rect x="10" y="160" width="26" height="26" rx="6" fill="#fff" stroke="#cdd9e3"/><text x="23" y="178" fill="#789">T</text>
        <rect x="10" y="194" width="26" height="26" rx="6" fill="#fff" stroke="#cdd9e3"/><text x="23" y="212" fill="#789">⚑</text>
        <rect x="10" y="228" width="26" height="26" rx="6" fill="#fff" stroke="#cdd9e3"/><text x="23" y="246" fill="#789">✓</text>
      </g>

      <!-- board canvas -->
      <rect x="46" y="40" width="676" height="500" fill="#eaf3fb"/>
      <!-- hexes (flat-top) -->
      <g stroke="#fff" stroke-width="2">
        <!-- col0 c1 -->
        <polygon points="198,218 184,242 156,242 142,218 156,194 184,194" fill="#e6550d"/>
        <polygon points="198,266 184,290 156,290 142,266 156,242 184,242" fill="#e6550d"/>
        <!-- col1 c1 -->
        <polygon points="240,194 226,218 198,218 184,194 198,170 226,170" fill="#e6550d"/>
        <polygon points="240,242 226,266 198,266 184,242 198,218 226,218" fill="#e6550d"/>
        <polygon points="240,290 226,314 198,314 184,290 198,266 226,266" fill="#e6550d"/>
        <!-- col2 c2 -->
        <polygon points="282,218 268,242 240,242 226,218 240,194 268,194" fill="#31a354"/>
        <polygon points="282,266 268,290 240,290 226,266 240,242 268,242" fill="#31a354"/>
        <!-- col3 c2/c3 -->
        <polygon points="324,194 310,218 282,218 268,194 282,170 310,170" fill="#31a354"/>
        <polygon points="324,242 310,266 282,266 268,242 282,218 310,218" fill="#3182bd"/>
        <polygon points="324,290 310,314 282,314 268,290 282,266 310,266" fill="#3182bd"/>
        <!-- col4 c3 -->
        <polygon points="366,218 352,242 324,242 310,218 324,194 352,194" fill="#3182bd"/>
        <polygon points="366,266 352,290 324,290 310,266 324,242 352,242" fill="#3182bd"/>
        <!-- col5 c6 -->
        <polygon points="408,194 394,218 366,218 352,194 366,170 394,170" fill="#e7ba52"/>
        <polygon points="408,242 394,266 366,266 352,242 366,218 394,218" fill="#e7ba52"/>
        <!-- island c4 -->
        <polygon points="560,278 546,302 518,302 504,278 518,254 546,254" fill="#756bb1"/>
      </g>
      <!-- selection ring on the capital -->
      <polygon points="198,218 184,242 156,242 142,218 156,194 184,194" fill="none" stroke="#111" stroke-width="3"/>
      <circle cx="170" cy="218" r="5" fill="#fff" stroke="#111" stroke-width="1.5"/>
      <!-- sea route to island -->
      <path d="M394,242 C440,250 470,266 506,278" fill="none" stroke="#2b6f99" stroke-width="2.4" stroke-dasharray="7,5"/>
      <!-- a couple of territory labels -->
      <g font-family="system-ui" font-size="9.5" fill="#fff" text-anchor="middle">
        <text x="170" y="222">T07★</text><text x="296" y="246">T31</text><text x="380" y="246">T44</text><text x="532" y="282">T80</text>
      </g>
      <text x="60" y="62" font-family="system-ui" font-size="11" fill="#6a89a3">Realm of perm-04 · one continent + island</text>

      <!-- inspector panel -->
      <rect x="722" y="40" width="238" height="500" fill="#fafcfe" stroke="#dde3ea"/>
      <text x="738" y="64" font-family="system-ui" font-size="10" letter-spacing="0.12em" font-weight="700" fill="#9ab">INSPECTOR</text>
      <text x="738" y="88" font-family="system-ui" font-size="15" font-weight="700" fill="#234">T07 · capital</text>
      <!-- country row -->
      <rect x="738" y="100" width="16" height="16" rx="3" fill="#e6550d"/>
      <text x="762" y="113" font-family="system-ui" font-size="12.5" fill="#456">Realm I (Country 1)</text>
      <!-- stats -->
      <g font-family="system-ui">
        <rect x="738" y="128" width="66" height="46" rx="8" fill="#fff" stroke="#e3e3e3"/>
        <text x="771" y="150" text-anchor="middle" font-size="17" font-weight="700" fill="#3182bd">+5</text><text x="771" y="166" text-anchor="middle" font-size="10" fill="#999">bonus</text>
        <rect x="810" y="128" width="66" height="46" rx="8" fill="#fff" stroke="#e3e3e3"/>
        <text x="843" y="150" text-anchor="middle" font-size="17" font-weight="700" fill="#3182bd">1</text><text x="843" y="166" text-anchor="middle" font-size="10" fill="#999">borders</text>
        <rect x="882" y="128" width="62" height="46" rx="8" fill="#eaf6ee" stroke="#9ad0ad"/>
        <text x="913" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#2e8b50">held</text><text x="913" y="166" text-anchor="middle" font-size="10" fill="#5a9c72">6% of wins</text>
      </g>
      <!-- tags -->
      <text x="738" y="196" font-family="system-ui" font-size="11" fill="#9ab">TAGS</text>
      <rect x="738" y="202" width="118" height="20" rx="10" fill="#f7fafd" stroke="#cdd9e3"/>
      <text x="797" y="216" text-anchor="middle" font-family="system-ui" font-size="11" fill="#456">regional_capital</text>
      <!-- divider -->
      <line x1="738" y1="244" x2="944" y2="244" stroke="#e3e3e3"/>
      <!-- board summary -->
      <text x="738" y="268" font-family="system-ui" font-size="10" letter-spacing="0.12em" font-weight="700" fill="#9ab">BOARD</text>
      <g font-family="system-ui" font-size="12.5" fill="#456">
        <text x="738" y="292">Territories</text><text x="944" y="292" text-anchor="end" font-weight="700" fill="#234">86</text>
        <text x="738" y="316">Countries</text><text x="944" y="316" text-anchor="end" font-weight="700" fill="#234">11</text>
        <text x="738" y="340">Composite</text><text x="944" y="340" text-anchor="end" font-weight="700" fill="#2e8b50">94.9</text>
        <text x="738" y="364">Islands · sea lanes</text><text x="944" y="364" text-anchor="end" font-weight="700" fill="#234">2 · 3</text>
      </g>
      <line x1="738" y1="384" x2="944" y2="384" stroke="#e3e3e3"/>
      <text x="738" y="408" font-family="system-ui" font-size="11.5" fill="#2e8b50">✓ contiguous</text>
      <text x="738" y="428" font-family="system-ui" font-size="11.5" fill="#2e8b50">✓ attack-graph connected</text>
      <text x="738" y="448" font-family="system-ui" font-size="11.5" fill="#2e8b50">✓ degree cap ≤ 3</text>
      <rect x="738" y="470" width="206" height="30" rx="8" fill="#3182bd"/>
      <text x="841" y="490" text-anchor="middle" font-family="system-ui" font-size="12.5" font-weight="700" fill="#fff">▶ Play this board</text>

      <!-- status bar -->
      <rect x="46" y="514" width="676" height="26" fill="#f4f7fa" stroke="#dde3ea"/>
      <text x="60" y="531" font-family="system-ui" font-size="11" fill="#789">autosaved · schema v2 · graph embedded</text>
      <text x="708" y="531" text-anchor="end" font-family="system-ui" font-size="11" fill="#789">zoom 100%</text>
    </svg>