<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Search space of territories versus countries. The buildable winning boards cluster small, 8 to 9 countries and roughly 40 to 53 territories, near World Risk's size; the big-board region that scored about 95 was an all-war mirage inflated by un-buildable hubs.">
