<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Anatomy of an AI turn: reinforce, then choose attacks through a holdability gate, then fortify — with the utility scores that rank each candidate attack.">
        <defs><marker id="a3" markerWidth="10" markerHeight="10" refX="7.5" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#7795b3"/></marker></defs>
        <text x="20" y="30" font-family="system-ui" font-size="18" font-weight="700" fill="#222">Anatomy of an AI turn</text>
        <text x="234" y="30" font-family="system-ui" font-size="12.5" fill="#999">one expert seat runs this loop every round</text>

        <g font-family="system-ui">
          <!-- 1 reinforce -->
          <rect x="20" y="56" width="270" height="118" rx="11" fill="#fff" stroke="#cdd9e3" stroke-width="1.5"/>
          <circle cx="48" cy="84" r="13" fill="#3182bd"/><text x="48" y="89" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">1</text>
          <text x="70" y="89" font-size="15.5" font-weight="700" fill="#234">Reinforce</text>
          <text x="38" y="118" font-size="12.5" fill="#555">place new armies on the</text>
          <text x="38" y="136" font-size="12.5" fill="#555">weakest <tspan font-weight="700" fill="#234">holdable</tspan> border</text>
          <rect x="38" y="148" width="78" height="20" rx="10" fill="#eef4fb"/><text x="77" y="162" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3182bd">+5 armies</text>

          <!-- 2 attack -->
          <rect x="345" y="56" width="270" height="118" rx="11" fill="#fff" stroke="#cdd9e3" stroke-width="1.5"/>
          <circle cx="373" cy="84" r="13" fill="#e6843c"/><text x="373" y="89" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">2</text>
          <text x="395" y="89" font-size="15.5" font-weight="700" fill="#234">Choose attacks</text>
          <text x="363" y="118" font-size="12.5" fill="#555">rank every legal attack,</text>
          <text x="363" y="136" font-size="12.5" fill="#555">pass each through the</text>
          <text x="363" y="155" font-size="12.5" font-weight="700" fill="#c0651f">holdability gate ↓</text>

          <!-- 3 fortify -->
          <rect x="670" y="56" width="270" height="118" rx="11" fill="#fff" stroke="#cdd9e3" stroke-width="1.5"/>
          <circle cx="698" cy="84" r="13" fill="#31a354"/><text x="698" y="89" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">3</text>
          <text x="720" y="89" font-size="15.5" font-weight="700" fill="#234">Fortify</text>
          <text x="688" y="118" font-size="12.5" fill="#555">shift armies toward the</text>
          <text x="688" y="136" font-size="12.5" fill="#555">active front line</text>
          <rect x="688" y="148" width="132" height="20" rx="10" fill="#eaf6ee"/><text x="754" y="162" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2e8b50">stack the spear-tip</text>
        </g>

        <!-- stage arrows + loop -->
        <line x1="293" y1="115" x2="342" y2="115" stroke="#7795b3" stroke-width="2.2" marker-end="url(#a3)"/>
        <line x1="618" y1="115" x2="667" y2="115" stroke="#7795b3" stroke-width="2.2" marker-end="url(#a3)"/>
        <path d="M805,174 L805,202 L155,202 L155,176" fill="none" stroke="#c3d4e6" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#a3)"/>
        <text x="480" y="197" text-anchor="middle" font-family="system-ui" font-size="11.5" fill="#9ab">end turn → next seat</text>

        <!-- DETAIL: inside step 2 -->
        <line x1="470" y1="174" x2="300" y2="232" stroke="#d9c4a8" stroke-width="1.3" stroke-dasharray="3,3"/>
        <rect x="20" y="232" width="920" height="290" rx="12" fill="#fafcfe" stroke="#e3e3e3" stroke-width="1.3"/>
        <text x="40" y="262" font-family="system-ui" font-size="13.5" font-weight="700" fill="#234">Inside step 2 — score every candidate, let the gate filter, fire the best</text>

        <g font-family="system-ui">
          <!-- gate flow (left) -->
          <rect x="70" y="284" width="180" height="34" rx="7" fill="#fff" stroke="#cdd9e3"/><text x="160" y="306" text-anchor="middle" font-size="12.5" fill="#234">attack <tspan font-weight="700">T19 ▸ T27</tspan></text>
          <line x1="160" y1="318" x2="160" y2="356" stroke="#7795b3" stroke-width="2" marker-end="url(#a3)"/>
          <polygon points="160,358 240,398 160,438 80,398" fill="#fff7ee" stroke="#e6843c" stroke-width="1.6"/>
          <text x="160" y="394" text-anchor="middle" font-size="11.5" fill="#a55714">can I still</text>
          <text x="160" y="409" text-anchor="middle" font-size="11.5" font-weight="700" fill="#a55714">hold it?</text>
          <line x1="240" y1="398" x2="296" y2="398" stroke="#31a354" stroke-width="2" marker-end="url(#a3)"/>
          <text x="268" y="390" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2e8b50">yes</text>
          <rect x="300" y="381" width="150" height="34" rx="7" fill="#eaf6ee" stroke="#9ad0ad"/><text x="375" y="403" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2e8b50">✓ commit attack</text>
          <line x1="160" y1="438" x2="160" y2="466" stroke="#9aa" stroke-width="2" marker-end="url(#a3)"/>
          <text x="178" y="456" font-size="10.5" font-weight="700" fill="#888">no</text>
          <rect x="58" y="468" width="320" height="34" rx="7" fill="#f1f2f4" stroke="#d6d9dd"/><text x="218" y="490" text-anchor="middle" font-size="12" fill="#777">✗ skip — it would only feed a counter-attack</text>

          <!-- utility bars (right) -->
          <text x="500" y="296" font-size="12.5" font-weight="700" fill="#234">candidate attacks, ranked by utility</text>
          <!-- row1 chosen -->
          <text x="500" y="324" font-size="12" fill="#234">conquer &amp; hold T27 <tspan font-size="11" fill="#2e8b50" font-weight="700">★ chosen</tspan></text>
          <rect x="500" y="330" width="330" height="18" rx="4" fill="#eef2f6"/>
          <rect x="500" y="330" width="270" height="18" rx="4" fill="#31a354"/>
          <text x="840" y="344" font-size="11.5" font-weight="700" fill="#2e8b50">0.82</text>
          <!-- row2 -->
          <text x="500" y="374" font-size="12" fill="#555">raid / pillage T14</text>
          <rect x="500" y="380" width="330" height="18" rx="4" fill="#eef2f6"/>
          <rect x="500" y="380" width="135" height="18" rx="4" fill="#6aaed6"/>
          <text x="840" y="394" font-size="11.5" font-weight="700" fill="#3182bd">0.41</text>
          <!-- row3 -->
          <text x="500" y="424" font-size="12" fill="#555">press T31 (thin margin)</text>
          <rect x="500" y="430" width="330" height="18" rx="4" fill="#eef2f6"/>
          <rect x="500" y="430" width="69" height="18" rx="4" fill="#c6dbef"/>
          <text x="840" y="444" font-size="11.5" font-weight="700" fill="#90a8c0">0.21</text>
          <text x="500" y="492" font-size="11.5" fill="#888">the seat commits the highest-utility attack that clears the gate, then repeats</text>
        </g>
      </svg>