<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mean composite rises to a peak around 6 to 8 countries then falls as fragmentation sets in.">
          <text x="0" y="18" font-family="system-ui" font-size="14" font-weight="700" fill="#222">Mean composite vs country count</text>
          <!-- axes -->
          <line x1="40" y1="250" x2="585" y2="250" stroke="#ccc"/>
          <line x1="40" y1="40" x2="40" y2="250" stroke="#ccc"/>
          <!-- y ticks (84-90) -->
          <g font-family="system-ui" font-size="10" fill="#999">
            <text x="8" y="250">84</text><line x1="40" y1="246" x2="585" y2="246" stroke="#f0f0f0"/>
            <text x="8" y="180">87</text><line x1="40" y1="176" x2="585" y2="176" stroke="#f0f0f0"/>
            <text x="8" y="110">89</text><line x1="40" y1="106" x2="585" y2="106" stroke="#f0f0f0"/>
            <text x="8" y="54">90</text>
          </g>
          <!-- bars: 6c 89.7, 7c ~88.5, 8c 89.0(sweet for balance via It10), 9c 87.3 ; scale y= 250-(v-84)/(90-84)*210 -->
          <!-- helper values precomputed -->
          <g>
            <rect x="80"  y="51"  width="70" height="199" rx="3" fill="#3182bd"/>
            <rect x="200" y="93"  width="70" height="157" rx="3" fill="#4a91c6"/>
            <rect x="320" y="75"  width="70" height="175" rx="3" fill="#3182bd"/>
            <rect x="440" y="135" width="70" height="115" rx="3" fill="#cdd9e3"/>
          </g>
          <g font-family="system-ui" font-size="12" font-weight="700" fill="#234">
            <text x="115" y="45"  text-anchor="middle">89.7</text>
            <text x="235" y="87"  text-anchor="middle">88.5</text>
            <text x="355" y="69"  text-anchor="middle">89.0</text>
            <text x="475" y="129" text-anchor="middle">87.3</text>
          </g>
          <g font-family="system-ui" font-size="12" fill="#555">
            <text x="115" y="268" text-anchor="middle">6 countries</text>
            <text x="235" y="268" text-anchor="middle">7</text>
            <text x="355" y="268" text-anchor="middle">8</text>
            <text x="475" y="268" text-anchor="middle">9</text>
          </g>
          <text x="312" y="290" text-anchor="middle" font-family="system-ui" font-size="10.5" fill="#999">fewer countries · more territory → fairer (then fragmentation bites)</text>
        </svg>